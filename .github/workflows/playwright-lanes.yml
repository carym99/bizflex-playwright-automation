name: Playwright Lanes

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright-lanes:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        lane:
          - smoke
          - auth
          - api-auth
          - regression

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run lane
        env:
          CI: true
          API_URL: ${{ secrets.API_URL }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          VALID_USER_EMAIL: ${{ secrets.VALID_USER_EMAIL }}
          VALID_USER_PASSWORD: ${{ secrets.VALID_USER_PASSWORD }}
          UI_USER_EMAIL: ${{ secrets.UI_USER_EMAIL }}
          UI_USER_PASSWORD: ${{ secrets.UI_USER_PASSWORD }}
          MFA_USER_EMAIL: ${{ secrets.MFA_USER_EMAIL }}
          MFA_USER_PASSWORD: ${{ secrets.MFA_USER_PASSWORD }}
          FAILED_LOGIN_BUDGET_MS: "7000"
        run: npm run test:${{ matrix.lane }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.lane }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
