name: CI Smoke (PR)

on:
  pull_request:

concurrency:
  group: ci-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Verify required credentials for Playwright (fail fast)
        shell: bash
        env:
          TEST_EMAIL_SECRET: ${{ secrets.TEST_EMAIL }}
          TEST_EMAIL_VAR: ${{ vars.TEST_EMAIL }}
          TEST_PASSWORD_SECRET: ${{ secrets.TEST_PASSWORD }}
        run: |
          export RESOLVED_TEST_EMAIL="${TEST_EMAIL_SECRET:-${TEST_EMAIL_VAR:-}}"
          export RESOLVED_TEST_PASSWORD="${TEST_PASSWORD_SECRET:-}"
          if [ -z "$RESOLVED_TEST_EMAIL" ]; then
            echo "::error::Missing TEST_EMAIL (secret or variable)"
            exit 1
          fi
          if [ -z "$RESOLVED_TEST_PASSWORD" ]; then
            echo "::error::Missing TEST_PASSWORD secret"
            exit 1
          fi
          {
            echo "TEST_EMAIL<<__CRED_EOF__"
            echo "$RESOLVED_TEST_EMAIL"
            echo "__CRED_EOF__"
            echo "TEST_PASSWORD<<__CRED_EOF__"
            echo "$RESOLVED_TEST_PASSWORD"
            echo "__CRED_EOF__"
          } >> "$GITHUB_ENV"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run PR smoke gate (@smoke | @auth | @api-auth)
        env:
          CI: true
          API_URL: ${{ secrets.API_URL }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_EMAIL: ${{ env.TEST_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          VALID_USER_EMAIL: ${{ secrets.VALID_USER_EMAIL }}
          VALID_USER_PASSWORD: ${{ secrets.VALID_USER_PASSWORD }}
          UI_USER_EMAIL: ${{ secrets.UI_USER_EMAIL }}
          UI_USER_PASSWORD: ${{ secrets.UI_USER_PASSWORD }}
          MFA_USER_EMAIL: ${{ secrets.MFA_USER_EMAIL }}
          MFA_USER_PASSWORD: ${{ secrets.MFA_USER_PASSWORD }}
          FAILED_LOGIN_BUDGET_MS: "7000"
        shell: bash
        run: |
          export API_URL="${API_URL:-https://bizflex.onrender.com}"
          export PLAYWRIGHT_BASE_URL="${PLAYWRIGHT_BASE_URL:-https://bizflex-app.netlify.app}"
          export BASE_URL="${BASE_URL:-${PLAYWRIGHT_BASE_URL}}"
          echo "### PR smoke gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Grep: \`@smoke|@auth|@api-auth\` (see \`config/tags.ts\` → \`prSmokeGateGrep\`)" >> "$GITHUB_STEP_SUMMARY"
          npx playwright test --list --grep "@smoke|@auth|@api-auth"
          npx playwright test --grep "@smoke|@auth|@api-auth"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-pr-smoke
          path: |
            playwright-report
            test-results
            reports
          retention-days: 7
          if-no-files-found: ignore
