name: Nightly regression

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-regression-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: true
      API_URL: ${{ secrets.API_URL }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      VALID_USER_EMAIL: ${{ secrets.VALID_USER_EMAIL }}
      VALID_USER_PASSWORD: ${{ secrets.VALID_USER_PASSWORD }}
      UI_USER_EMAIL: ${{ secrets.UI_USER_EMAIL }}
      UI_USER_PASSWORD: ${{ secrets.UI_USER_PASSWORD }}
      MFA_USER_EMAIL: ${{ secrets.MFA_USER_EMAIL }}
      MFA_USER_PASSWORD: ${{ secrets.MFA_USER_PASSWORD }}
      E2E_SELECT_ACCOUNT_TYPE: ${{ secrets.E2E_SELECT_ACCOUNT_TYPE }}
      E2E_SELECT_ACCOUNT_NAME: ${{ secrets.E2E_SELECT_ACCOUNT_NAME }}
      E2E_SELECT_ACCOUNT_ID: ${{ secrets.E2E_SELECT_ACCOUNT_ID }}
      E2E_SELECT_ACCOUNT_CONTEXT_ID: ${{ secrets.E2E_SELECT_ACCOUNT_CONTEXT_ID }}
      E2E_DEFAULT_ACCOUNT_ID: ${{ secrets.E2E_DEFAULT_ACCOUNT_ID }}
      E2E_DEFAULT_ACCOUNT_CONTEXT_ID: ${{ secrets.E2E_DEFAULT_ACCOUNT_CONTEXT_ID }}
      E2E_FREELANCE_ACCOUNT_NAME: ${{ secrets.E2E_FREELANCE_ACCOUNT_NAME }}
      E2E_FREELANCE_ACCOUNT_ID: ${{ secrets.E2E_FREELANCE_ACCOUNT_ID }}
      E2E_FREELANCE_ACCOUNT_CONTEXT_ID: ${{ secrets.E2E_FREELANCE_ACCOUNT_CONTEXT_ID }}
      E2E_FREELANCE_WALLET_ID: ${{ secrets.E2E_FREELANCE_WALLET_ID }}
      E2E_FREELANCE_BUSINESS_ID: ${{ secrets.E2E_FREELANCE_BUSINESS_ID }}
      E2E_BUSINESS_ACCOUNT_NAME: ${{ secrets.E2E_BUSINESS_ACCOUNT_NAME }}
      E2E_BUSINESS_ACCOUNT_ID: ${{ secrets.E2E_BUSINESS_ACCOUNT_ID }}
      E2E_BUSINESS_ACCOUNT_CONTEXT_ID: ${{ secrets.E2E_BUSINESS_ACCOUNT_CONTEXT_ID }}
      E2E_BUSINESS_ID: ${{ secrets.E2E_BUSINESS_ID }}
      E2E_BUSINESS_WALLET_ID: ${{ secrets.E2E_BUSINESS_WALLET_ID }}
      E2E_BUSINESS_ACCOUNT_NAME_2: ${{ secrets.E2E_BUSINESS_ACCOUNT_NAME_2 }}
      E2E_BUSINESS_ACCOUNT_ID_2: ${{ secrets.E2E_BUSINESS_ACCOUNT_ID_2 }}
      E2E_BUSINESS_ACCOUNT_CONTEXT_ID_2: ${{ secrets.E2E_BUSINESS_ACCOUNT_CONTEXT_ID_2 }}
      E2E_BUSINESS_ID_2: ${{ secrets.E2E_BUSINESS_ID_2 }}
      E2E_BUSINESS_WALLET_ID_2: ${{ secrets.E2E_BUSINESS_WALLET_ID_2 }}
      FAILED_LOGIN_BUDGET_MS: "7000"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Verify required credentials for Playwright (fail fast)
        shell: bash
        env:
          TEST_EMAIL_SECRET: ${{ secrets.TEST_EMAIL }}
          TEST_EMAIL_VAR: ${{ vars.TEST_EMAIL }}
          TEST_PASSWORD_SECRET: ${{ secrets.TEST_PASSWORD }}
        run: |
          export RESOLVED_TEST_EMAIL="${TEST_EMAIL_SECRET:-${TEST_EMAIL_VAR:-}}"
          export RESOLVED_TEST_PASSWORD="${TEST_PASSWORD_SECRET:-}"
          if [ -z "$RESOLVED_TEST_EMAIL" ] || [ -z "$RESOLVED_TEST_PASSWORD" ]; then
            echo "::error::Missing TEST_EMAIL / TEST_PASSWORD for nightly run"
            exit 1
          fi
          {
            echo "TEST_EMAIL<<__CRED_EOF__"
            echo "$RESOLVED_TEST_EMAIL"
            echo "__CRED_EOF__"
            echo "TEST_PASSWORD<<__CRED_EOF__"
            echo "$RESOLVED_TEST_PASSWORD"
            echo "__CRED_EOF__"
          } >> "$GITHUB_ENV"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Refresh authenticated storage (npm run auth)
        shell: bash
        run: |
          source .github/scripts/export-playwright-account-env.sh
          npm run auth

      - name: Run account-selection suite (ui-login, workers=1)
        shell: bash
        env:
          REQUIRE_E2E_ACCOUNT_CONTEXT: "1"
        run: |
          source .github/scripts/export-playwright-account-env.sh
          echo "### Account selection (nightly)" >> "$GITHUB_STEP_SUMMARY"
          npm run test:account-selection:ci

      - name: Full Playwright suite (excl. @account-selection)
        shell: bash
        run: |
          source .github/scripts/export-playwright-account-env.sh
          echo "### Nightly full suite" >> "$GITHUB_STEP_SUMMARY"
          echo "Running \`playwright test --grep-invert @account-selection\` (picker suite ran above)." >> "$GITHUB_STEP_SUMMARY"
          npx playwright test --grep-invert "@account-selection"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-nightly-${{ github.run_id }}
          path: |
            playwright-report
            test-results
            reports
          retention-days: 7
          if-no-files-found: ignore
